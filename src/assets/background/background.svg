<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
    width="100"
    height="100"
    viewBox="0 0 100 100"
    version="1.1"
    id="svg1"
    sodipodi:docname="XrossInfinite.svg"
    inkscape:version="1.4.3 (0d15f75042, 2025-12-25)"
    xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
    xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
    xmlns="http://www.w3.org/2000/svg"
    xmlns:svg="http://www.w3.org/2000/svg"
>
    <defs id="defs1">
        <linearGradient id="prismGradient" x1="0%" y1="0%" x2="100%" y2="20%">
            <stop offset="0%" stop-color="#ff0000" />
            <stop offset="25%" stop-color="#ffff00" />
            <stop offset="45%" stop-color="#00ff00" />
            <stop offset="55%" stop-color="#00ffff" />
            <stop offset="75%" stop-color="#0000ff" />
            <stop offset="100%" stop-color="#ff00ff" />
        </linearGradient>
        <filter id="bgGlow" x="-100%" y="-100%" width="300%" height="300%">
            <!-- 1. 中くらいのボケで、ロゴの周りに濃厚な光の溜まりを作る -->
            <feGaussianBlur stdDeviation="15" result="midBlur" />
            <!-- 2. 圧倒的に大きなボケで、画面全体に光を広く拡散させる -->
            <feGaussianBlur stdDeviation="60" result="wideBlur" />

            <!-- 3. 2つのボケを混ぜ合わせる -->
            <feMerge result="combinedBlur">
                <feMergeNode in="wideBlur" />
                <feMergeNode in="midBlur" />
            </feMerge>

            <!-- 4. 混ざった広大な光の「不透明度」を3倍にして、めちゃくちゃ濃くする -->
            <feComponentTransfer in="combinedBlur" result="intenseBg">
                <feFuncA type="linear" slope="3.0" />
            </feComponentTransfer>

            <!-- 背景用なので、元のくっきりしたロゴ（SourceGraphic）は重ねず、光の膜だけを出力 -->
            <feMerge>
                <feMergeNode in="intenseBg" />
            </feMerge>
        </filter>
    </defs>
    <path
        style="
            baseline-shift: baseline;
            display: inline;
            overflow: visible;
            vector-effect: none;
            enable-background: accumulate;
            stop-color: #000000;
            stop-opacity: 1;
            opacity: 1;
            filter: url(#bgGlow);
        "
        fill="url(#prismGradient)"
        d="M 23.964844,37.5 17.5,43.964844 V 56.035156 L 23.964844,62.5 h 17.070312 l 20,-20 H 73.964844 L 77.5,46.035156 v 7.929688 L 73.964844,57.5 H 61.035156 L 56.767578,53.232422 53.232422,56.767578 58.964844,62.5 H 76.035156 L 82.5,56.035156 V 43.964844 L 76.035156,37.5 H 58.964844 l -20,20 H 26.035156 L 22.5,53.964844 V 46.035156 L 26.035156,42.5 h 12.929688 l 4.267578,4.267578 3.535156,-3.535156 L 41.035156,37.5 Z"
        id="path2"
    />
    <path
        style="
            baseline-shift: baseline;
            display: inline;
            overflow: visible;
            vector-effect: none;
            enable-background: accumulate;
            stop-color: #000000;
            stop-opacity: 1;
            opacity: 1;
        "
        d="M 23.964844,37.5 17.5,43.964844 V 56.035156 L 23.964844,62.5 h 17.070312 l 20,-20 H 73.964844 L 77.5,46.035156 v 7.929688 L 73.964844,57.5 H 61.035156 L 56.767578,53.232422 53.232422,56.767578 58.964844,62.5 H 76.035156 L 82.5,56.035156 V 43.964844 L 76.035156,37.5 H 58.964844 l -20,20 H 26.035156 L 22.5,53.964844 V 46.035156 L 26.035156,42.5 h 12.929688 l 4.267578,4.267578 3.535156,-3.535156 L 41.035156,37.5 Z"
        fill="#000000"
        id="path1"
    />
</svg>
